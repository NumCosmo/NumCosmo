[pytest]
# importlib import mode: pytest does not insert test directories onto sys.path, so a
# test module directory (e.g. math/) cannot shadow a stdlib/third-party module. Requires
# unique test-file basenames across the tree. See TESTING.md.
addopts = --import-mode=importlib
# Thread-traceback dumps for a single test running long are handled by our own
# pytest_runtest_protocol hook in conftest.py, not this builtin ini option --
# see the comment there for why (one-shot vs. repeating dumps).
# Markers, grouped by axis (see TESTING.md). This is the single source of marker
# declarations; conftest.py only wires the --run-* options and skip logic.
# Tier (cost/intent): unit is the default and is left UNMARKED.
markers =
    statistical: Seeded, tolerance-based numerics (off the fast lane)
    acceptance: Full integration / posterior-recovery tests (slowest)
    # Opt-in capabilities: runnable but skipped by default (gated by --run-* in conftest).
    powspec: Power-spectrum tests (run with --run-powspec)
    xcor: Cross-correlation tests (run with --run-xcor)
    mpi: MPI-parallel tests (run with --run-mpi)
    app: Application/CLI tests, incl. parallel ESMCMC (run with --run-app)
    sphere_map: Sphere-map tests (run with --run-sphere-map)
    omp: Has an OpenMP-parallel path; additionally run in a dedicated OMP_NUM_THREADS>1 lane
    # Optional-dependency label: auto-skipped via pytest.importorskip when pyccl is absent.
    ccl: Cross-checks against pyccl (selection label; skipped automatically without pyccl)
