[pytest]
# Dump all thread tracebacks if a single test exceeds this many seconds, so a
# hang (e.g. a threading/BLAS deadlock) is diagnosable in CI instead of stalling
# the job silently. Default tests are far below this; heavy suites set timeout: 0
# at the meson level and are gated behind --run-* opts.
faulthandler_timeout = 300
markers =
    powspec: Power spectrum tests
    xcor: Cross-correlation tests
    slow: Slow-running tests
    mpi: MPI-parallel tests
    ccl: Tests requiring pyccl
    app: Application tests requiring CLI dependencies
