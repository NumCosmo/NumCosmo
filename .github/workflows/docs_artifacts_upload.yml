name: Docs Artifacts Upload

on:
  pull_request:
  push:
    branches:
      - master

env:
  ARTIFACT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  docs-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v4
        with:
          activate-environment: numcosmo_developer
          environment-file: environment.yml
          auto-activate-base: false
          auto-update-conda: true
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            cm-super \
            dvipng
      - name: Build documentation
        shell: bash -l {0}
        run: |
          meson setup BDocs -Ddocumentation=true
          meson compile -C BDocs
      - name: Upload Quarto freeze
        uses: actions/upload-artifact@v4
        with:
          name: quarto-freeze-${{ env.ARTIFACT_SHA }}
          path: BDocs/docs/.quarto/_freeze
          if-no-files-found: error

      - name: Trigger RTD build
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
        run: |
          # Skip if no token is available (e.g., on forks)
          if [ -z "${RTD_TOKEN}" ]; then
            echo "RTD_TOKEN not set, skipping RTD build trigger"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            VERSION="pull/${{ github.event.pull_request.number }}"
          else
            VERSION="${{ github.ref_name }}"
          fi

          export VERSION
          VERSION_URL=$(python3 -c "import urllib.parse, os; print(urllib.parse.quote(os.environ.get('VERSION', ''), safe=''))")

          echo "VERSION=${VERSION}"
          echo "VERSION_URL=${VERSION_URL}"

          API_URL="https://app.readthedocs.org/api/v3/projects/numcosmo/versions/${VERSION_URL}/builds/"

          echo "API_URL=${API_URL}"

          HTTP_CODE=$(curl -L -w "%{http_code}" -o /tmp/rtd_response.json -s -X POST \
            -H "Authorization: Token ${RTD_TOKEN}" \
            -H "Content-Type: application/json" \
            "${API_URL}")

          echo "Response code: ${HTTP_CODE}"
          cat /tmp/rtd_response.json
          echo ""

          if [ "${HTTP_CODE}" -ge 200 ] && [ "${HTTP_CODE}" -lt 300 ]; then
            echo "Successfully triggered RTD build"
            exit 0
          else
            echo "Failed to trigger RTD build (HTTP ${HTTP_CODE})"
            exit 1
          fi