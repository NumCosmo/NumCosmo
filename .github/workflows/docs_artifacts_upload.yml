name: Docs Artifacts Upload

on:
  pull_request:
  push:
    branches:
      - master

env:
  ARTIFACT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  docs-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v4
        with:
          activate-environment: numcosmo_developer
          environment-file: environment.yml
          auto-activate-base: false
          auto-update-conda: true
      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            cm-super \
            dvipng
      - name: Build documentation
        shell: bash -l {0}
        run: |
          meson setup BDocs -Ddocumentation=true
          meson compile -C BDocs
      - name: Upload Quarto freeze
        uses: actions/upload-artifact@v4
        with:
          name: quarto-freeze-${{ env.ARTIFACT_SHA }}
          path: BDocs/docs/.quarto/_freeze
          if-no-files-found: error
      - name: Trigger RTD build
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            VERSION="pull/${{ github.event.pull_request.number }}"
          else
            VERSION="${{ github.ref_name }}"
          fi

          VERSION_URL=$(python -c \
            "import urllib.parse; print(urllib.parse.quote('${VERSION}', safe=''))")

          echo "Triggering RTD version: ${VERSION}"

          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Token ${RTD_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://app.readthedocs.org/api/v3/projects/numcosmo/versions/${VERSION_URL}/builds/")

          echo "$RESPONSE"