name: References Lint

on:
  pull_request:
    paths:
      - 'docs/references.bib'
      - 'docs/tidy_references.sh'
      - '.github/workflows/bib_lint.yml'
  push:
    branches:
      - master
    paths:
      - 'docs/references.bib'
      - 'docs/tidy_references.sh'

jobs:
  bibtex-tidy:
    name: references.bib is tidy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Pin the version: different bibtex-tidy releases can format differently.
      - name: Install bibtex-tidy
        run: npm install -g bibtex-tidy@1.14.0

      - name: Check formatting
        run: ./docs/tidy_references.sh --check
